name: Deploy to Streamlit Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check imports
        run: python -c "import app; print('✅ app imports OK')" || echo "Check imports manually"
      - name: Lint
        run: pip install flake8 && flake8 . --max-line-length=120 --exclude=__pycache__,.git || true
